name: 'bfsi_omnichannel'
version: '1.0.0'
config-version: 2

profile: 'default'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  bfsi_omnichannel:
    # This configures our Medallion layers inside the models directory
    silver:
      +materialized: incremental
      +schema: silver
    gold:
      +materialized: table
      +schema: gold